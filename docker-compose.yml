services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: oniria-web:latest
    container_name: oniria-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
    networks:
      - oniria

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: oniria-tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - web
    networks:
      - oniria

networks:
  oniria:
    driver: bridge
